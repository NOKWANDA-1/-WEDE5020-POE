<div class="order-container">
  <h3>Place Your Order</h3>
  <form action="https://formspree.io/f/mpqeedop" method="POST">
  
    <label>Full Name</label>
    <input type="text" name="name" placeholder=" your name" required>

    <label>Email</label>
<input type="email" name="email" placeholder=" your email" required>

    <label>Phone</label>
<input type="tel" name="phone" placeholder=" your phone number" required>

    <label>What would you like to order?</label>
      <div class="order-item">

        <select name="item1" id="item1">
          <option value="">Select an item</option>
          <option value="Sourdough Bread - R25">Sourdough Bread - R25</option>
          <option value="Whole Wheat Bread - R30">Whole Wheat Bread - R30</option>
          <option value="White Bread - R20">White Bread - R20</option>
          <option value="Croissant - R30">Croissant - R30</option>
          <option value="Plain Bagel - R15">Plain Bagel - R15</option>
          <option value="Bagel with Filling - R25">Bagel with Filling - R25</option>

          <option value="Slice of choco classic - R65">Slice of choco classic - R65</option>
          <option value="Slice of Red velvet cake- R75">Slice of Red velvet cake - R75</option>
          <option value="slice of cookies and cream- R65">Slice of cookies and cream - R65</option>
          <option value="slice of vanilla- R60">Slice of vanilla - R60</option>

          <option value="Choco Classic - R500">Choco Classic - R500</option>
          <option value="Red Velvet - R450">Red Velvet - R450</option>
          <option value="Cookies and Cream - R500">Cookies and Cream - R500</option>
          <option value="Vanilla - R550">Vanilla - R550</option>

          <option value="Sugar cookies - R15">Sugar cookies - R15</option>
          <option value="Chocolate chip cookie - R25">Chocolate chip cookie - R25</option>
          <option value="Classic biscuit half dipped in chocolate - R15">Classic biscuit half dipped in chocolate - R15</option>
          <option value="blue berry muffin - R30">blue berry muffin - R30</option>
          <option value="choco chip muffin - R35">choco chip muffin - R35</option>
          <option value="banna muffin - R30">banna muffin - R30</option>
          <option value="bran muffin - R40">bran muffin - R40</option>
          
        </select>
        <input type="number" name="quantity" id="qty1" min="1" value="1" placeholder="Qty">
      </div>

      <div class="order-item">
        <select name="item2" id="item2">
          <option value="Add another item (optional)">Add another item (optional)</option>
          <option value="americano - R35">americano - R35</option>
          <option value="macchiato - R35">macchiato - R35</option>
          <option value="espresso - R30">espresso - R30</option>
          <option value= "latte - R45"> latte - R45</option>
          <option value="cappuccino - R43">cappuccino - R43</option>
          <option value="hot chocolate - R45">hot chocolate - R45</option>
          <option value="iced matcha - R50">iced matcha - R50</option>
          <option value="green tea - R35">green tea - R35</option>
          <option value="fresh juice - R25">fresh juice - R25</option>
        </select>
        <input type="number" name="quantity" id="qty2" min="1" value="1" placeholder="Qty">
      </div>

    <label>Special Instructions</label>
    <textarea name="notes" rows="3" placeholder="Allergies, pickup time, etc."></textarea>

    <label>Pickup or Delivery</label>
    <select name="pickup" required>
      <option value="Pickup">Pickup</option>
      <option value="Delivery">Delivery</option>
    </select>
</div>
    <input type="hidden" name="_subject" value="New order recieved">
    <input type="hidden" name="_autoresponse" value="Thank you for your order! We will contact you shortly to confirm the details.">
    <button type="submit">Submit Order</button>
  </form>
